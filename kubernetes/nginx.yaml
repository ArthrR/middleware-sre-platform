apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lb
  namespace: enterprise-middleware
  labels:
    app: nginx
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nginx
      tier: frontend
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: enterprise-middleware
  labels:
    app: nginx
spec:
  type: LoadBalancer
  selector:
    app: nginx
    tier: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: enterprise-middleware
data:
  default.conf: |
    upstream tomcat_backend {
        server tomcat-service:8080;
    }

    upstream nodejs_backend {
        server nodejs-service:3000;
    }

    server {
        listen 80;
        server_name _;

        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /api/v1/ {
            proxy_pass http://tomcat_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v2/ {
            proxy_pass http://nodejs_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

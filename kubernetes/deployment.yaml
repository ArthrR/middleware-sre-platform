---
apiVersion: v1
kind: Namespace
metadata:
  name: wso2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-api-manager
  namespace: wso2
  labels:
    app: wso2-apim
    version: v1

spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: wso2-apim

  template:
    metadata:
      labels:
        app: wso2-apim
        version: v1

    spec:
      containers:
        - name: wso2-apim
          image: wso2/wso2am:4.2.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8280
              name: http
              protocol: TCP
            - containerPort: 8243
              name: https
              protocol: TCP
            - containerPort: 9443
              name: mgmt
              protocol: TCP

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /am/services/HealthCheckService
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /am/services/HealthCheckService
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          env:
            - name: JAVA_OPTS
              value: "-Xmx2048m -Xms2048m"
            - name: WSO2_SERVER_PROFILE
              value: "api-manager"

          volumeMounts:
            - name: config-volume
              mountPath: /home/wso2carbon/wso2am-conf/conf
              readOnly: true

      volumes:
        - name: config-volume
          configMap:
            name: wso2-apim-config

---
apiVersion: v1
kind: Service
metadata:
  name: wso2-apim-service
  namespace: wso2
  labels:
    app: wso2-apim

spec:
  type: LoadBalancer
  selector:
    app: wso2-apim

  ports:
    - name: http
      port: 8280
      targetPort: 8280
      protocol: TCP
    - name: https
      port: 8243
      targetPort: 8243
      protocol: TCP
    - name: management
      port: 9443
      targetPort: 9443
      protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wso2-apim-config
  namespace: wso2

data:
  api-manager.xml: |
    <APIManager>
        <DataSources>
            <DataSource>
                <Name>WSO2_CARBON_DB</Name>
                <JndiConfig>
                    <Name>jdbc/WSO2CarbonDB</Name>
                </JndiConfig>
            </DataSource>
        </DataSources>
    </APIManager>

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wso2-apim-hpa
  namespace: wso2

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wso2-api-manager

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

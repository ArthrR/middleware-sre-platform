apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-api
  namespace: enterprise-middleware
  labels:
    app: nodejs
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nodejs
      tier: backend
  template:
    metadata:
      labels:
        app: nodejs
        tier: backend
    spec:
      containers:
      - name: nodejs
        image: node:18-alpine
        workingDir: /app
        command: ["sh", "-c", "npm install && npm start"]
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: connection_string
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: nodejs-service
  namespace: enterprise-middleware
  labels:
    app: nodejs
spec:
  type: ClusterIP
  selector:
    app: nodejs
    tier: backend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
